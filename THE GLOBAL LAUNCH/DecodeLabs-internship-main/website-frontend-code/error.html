<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error 404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 100px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 25px;
            font-size: 16px;
            opacity: 0.9;
        }

        .btn {
            text-decoration: none;
            background: white;
            color: #764ba2;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>

</body>
</html>
